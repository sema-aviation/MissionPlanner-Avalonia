name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref so rapid pushes don't pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Format check
        run: |
          for p in src/MissionPlannerAvalonia/MissionPlannerAvalonia.csproj tests/MissionPlannerAvalonia.Tests/MissionPlannerAvalonia.Tests.csproj; do
            dotnet format whitespace "$p" --verify-no-changes
            dotnet format style "$p" --verify-no-changes
          done

      - name: Test
        run: dotnet test tests/MissionPlannerAvalonia.Tests/MissionPlannerAvalonia.Tests.csproj -c Release

  # Compile on every release OS so cross-platform restore/build breaks fail here, not at tag time.
  cross-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build src/MissionPlannerAvalonia/MissionPlannerAvalonia.csproj -c Release
