name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual

      # Manual build mode: CodeQL traces this compile (only our app, not the pinned submodule libs).
      - name: Build
        run: dotnet build src/MissionPlannerAvalonia/MissionPlannerAvalonia.csproj -c Release

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"
