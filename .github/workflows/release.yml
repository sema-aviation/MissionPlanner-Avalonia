name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  APP: src/MissionPlannerAvalonia/MissionPlannerAvalonia.csproj

jobs:
  validate-version:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Check tag matches current year.month (UTC)
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          if [[ ! "$V" =~ ^[0-9]{4}\.[0-9]{1,2}(\..+)?$ ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' is not CalVer (expected vYYYY.M or vYYYY.M.patch)."
            exit 1
          fi
          TAG_YEAR="${V%%.*}"
          REST="${V#*.}"
          TAG_MONTH="${REST%%.*}"
          NOW_YEAR="$(date -u +%Y)"
          NOW_MONTH="$(date -u +%-m)"
          if [[ "$TAG_YEAR" != "$NOW_YEAR" || "$TAG_MONTH" != "$NOW_MONTH" ]]; then
            echo "::error::CalVer mismatch: tag is ${TAG_YEAR}.${TAG_MONTH} but current UTC date is ${NOW_YEAR}.${NOW_MONTH}. Re-tag with v${NOW_YEAR}.${NOW_MONTH}."
            exit 1
          fi
          echo "OK: ${TAG_YEAR}.${TAG_MONTH} matches current UTC month."

  package:
    needs: validate-version
    if: always() && (needs.validate-version.result == 'success' || needs.validate-version.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rid: osx-arm64
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          REF="${GITHUB_REF_NAME:-dev}"
          V="${REF#v}"
          # Patch = 3rd CalVer field (default 0). Passed as VersionPatch so the app project's
          # date-derived Version resolves to this; we must NOT pass a global -p:Version because
          # it leaks into the shielded submodule's MetaDataExtractor ProjectReference.
          IFS=. read -r _y _m _p <<< "$V"
          echo "v=$V" >> "$GITHUB_OUTPUT"
          echo "patch=${_p:-0}" >> "$GITHUB_OUTPUT"
          echo "fv=$V.0" >> "$GITHUB_OUTPUT"

      - name: Package macOS (.app, self-contained)
        if: matrix.rid == 'osx-arm64'
        shell: bash
        run: |
          V=${{ steps.ver.outputs.v }}
          rm -rf out/osx dist
          dotnet publish "$APP" -c Release -r osx-arm64 --self-contained true \
            -p:DebugType=none -p:StripSymbols=true \
            -p:VersionPatch="${{ steps.ver.outputs.patch }}" -p:FileVersion="${{ steps.ver.outputs.fv }}" -p:AssemblyVersion="${{ steps.ver.outputs.fv }}" \
            -o out/osx
          chmod +x build/macos/make-app.sh
          ./build/macos/make-app.sh out/osx "$V" "dist/Mission Planner.app"
          mkdir -p upload
          ( cd dist && ditto -c -k --sequesterRsrc --keepParent \
              "Mission Planner.app" "../upload/MissionPlannerAvalonia-$V-osx-arm64.zip" )

      - name: Package Windows (self-contained folder)
        if: matrix.rid == 'win-x64'
        shell: bash
        run: |
          V=${{ steps.ver.outputs.v }}
          rm -rf out/win stage
          # Self-contained folder (loose dlls) so the auto-updater can diff and download only the
          # changed files instead of the whole exe.
          dotnet publish "$APP" -c Release -r win-x64 --self-contained true \
            -p:DebugType=none \
            -p:VersionPatch="${{ steps.ver.outputs.patch }}" -p:FileVersion="${{ steps.ver.outputs.fv }}" -p:AssemblyVersion="${{ steps.ver.outputs.fv }}" \
            -o out/win
          DIR="MissionPlannerAvalonia-$V-win-x64"
          mkdir -p "stage/$DIR"
          cp -r out/win/. "stage/$DIR/"
          mkdir -p upload
          ( cd stage && 7z a -tzip "../upload/$DIR.zip" "$DIR" >/dev/null )

      - name: Package Linux (self-contained)
        if: matrix.rid == 'linux-x64'
        shell: bash
        run: |
          V=${{ steps.ver.outputs.v }}
          rm -rf out/linux
          dotnet publish "$APP" -c Release -r linux-x64 --self-contained true \
            -p:DebugType=none \
            -p:VersionPatch="${{ steps.ver.outputs.patch }}" -p:FileVersion="${{ steps.ver.outputs.fv }}" -p:AssemblyVersion="${{ steps.ver.outputs.fv }}" \
            -o out/linux
          cp build/linux/missionplanner-avalonia.desktop out/linux/
          cp build/linux/missionplanner-avalonia.png out/linux/
          cp build/linux/install.sh out/linux/
          chmod +x out/linux/MissionPlannerAvalonia out/linux/install.sh
          DIR="MissionPlannerAvalonia-$V-linux-x64"
          mv out/linux "out/$DIR"
          mkdir -p upload
          tar -czf "upload/$DIR.tar.gz" -C out "$DIR"

      - name: Build + sign update manifest
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.UPDATE_SIGNING_KEY }}
        run: |
          V=${{ steps.ver.outputs.v }}
          RID=${{ matrix.rid }}
          case "$RID" in
            win-x64)   PUB=out/win ;;
            osx-arm64) PUB=out/osx ;;
            linux-x64) PUB="out/MissionPlannerAvalonia-$V-linux-x64" ;;
          esac
          SITE="site/$RID"
          rm -rf "$SITE"; mkdir -p "$SITE"
          cp -R "$PUB"/. "$SITE"/
          NOTES="https://github.com/sema-aviation/MissionPlanner-Avalonia/releases/tag/v$V"
          python3 build/gen-manifest.py "$SITE" "$V" "$NOTES" "$SITE/manifest.json"
          # Sign the exact manifest bytes with the Ed25519 private key (raw 64-byte sig, base64).
          printf '%s' "$SIGNING_KEY" > update_key.pem
          openssl pkeyutl -sign -rawin -inkey update_key.pem -in "$SITE/manifest.json" -out update.sig.bin
          base64 update.sig.bin | tr -d '\n' > "$SITE/manifest.sig"
          rm -f update_key.pem update.sig.bin

      - uses: actions/upload-artifact@v7
        with:
          name: pages-${{ matrix.rid }}
          path: site/${{ matrix.rid }}
          include-hidden-files: true

      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.rid }}
          path: upload/*

  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: artifacts
      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true
          prerelease: false

  # Host the per-platform loose file tree + signed manifest for the in-app auto-updater.
  pages:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pages-*
          path: site-dl
      - name: Assemble site
        shell: bash
        run: |
          mkdir -p site
          for d in site-dl/pages-*; do
            rid="$(basename "$d" | sed 's/^pages-//')"
            mkdir -p "site/$rid"
            cp -R "$d"/. "site/$rid"/
          done
          ls -R site | head -50
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
