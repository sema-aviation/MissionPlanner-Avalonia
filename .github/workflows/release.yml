name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  APP: src/MissionPlannerAvalonia/MissionPlannerAvalonia.csproj

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rid: osx-arm64
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          REF="${GITHUB_REF_NAME:-dev}"
          echo "v=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Package macOS (.app, self-contained)
        if: matrix.rid == 'osx-arm64'
        shell: bash
        run: |
          V=${{ steps.ver.outputs.v }}
          dotnet publish "$APP" -c Release -r osx-arm64 --self-contained true \
            -p:DebugType=none -p:Version="$V" -o out/osx
          chmod +x build/macos/make-app.sh
          ./build/macos/make-app.sh out/osx "$V" "dist/MissionPlanner Avalonia.app"
          mkdir -p upload
          ( cd dist && zip -qry "../upload/MissionPlannerAvalonia-$V-osx-arm64.zip" "MissionPlanner Avalonia.app" )

      - name: Package Windows (self-contained single-file)
        if: matrix.rid == 'win-x64'
        shell: bash
        run: |
          V=${{ steps.ver.outputs.v }}
          dotnet publish "$APP" -c Release -r win-x64 --self-contained true \
            -p:DebugType=none -p:Version="$V" \
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true \
            -o out/win
          mkdir -p upload
          ( cd out/win && 7z a -tzip "../../upload/MissionPlannerAvalonia-$V-win-x64.zip" . >/dev/null )

      - name: Package Linux (framework-dependent, smaller)
        if: matrix.rid == 'linux-x64'
        shell: bash
        run: |
          V=${{ steps.ver.outputs.v }}
          dotnet publish "$APP" -c Release -r linux-x64 --self-contained false \
            -p:DebugType=none -p:Version="$V" -o out/linux
          cp build/linux/missionplanner-avalonia.desktop out/linux/
          cp build/linux/missionplanner-avalonia.png out/linux/
          chmod +x out/linux/MissionPlannerAvalonia
          mkdir -p upload
          tar -czf "upload/MissionPlannerAvalonia-$V-linux-x64.tar.gz" -C out/linux .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: upload/*

  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            Self-contained macOS (arm64 .app) and Windows (single-file) builds, plus a
            framework-dependent Linux build (needs the .NET 10 runtime installed).

            macOS is unsigned: right-click -> Open, or `xattr -dr com.apple.quarantine "MissionPlanner Avalonia.app"`.

            Independent Avalonia port of ArduPilot Mission Planner. GPLv3. Not affiliated with ArduPilot.
