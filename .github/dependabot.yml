version: 2
updates:
  # Scans our Directory.Packages.props (central package management). The pinned upstream
  # submodule is a gitlink, so Dependabot does not descend into its inline versions.
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: build

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
